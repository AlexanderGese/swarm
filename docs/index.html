<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>swarm — bittorrent in your browser</title>
<style>
  :root {
    --bg:#0b0e14; --panel:#11151f; --line:#1f2733; --dim:#5b6878; --txt:#c8d3e0;
    --have:#6ee787; --active:#f0c674; --miss:#1c2430; --accent:#58a6ff; --cyan:#56d4dd;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:26px 16px; }
  h1 { margin:0; font-size:21px; color:#e6edf3; } h1 .x { color:var(--accent); }
  .sub { color:var(--dim); margin:4px 0 20px; font-size:13px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:18px; margin-bottom:18px; width:min(720px,95vw); }
  .panel h2 { margin:0 0 12px; font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
  .grid { display:grid; grid-template-columns:repeat(24,1fr); gap:3px; }
  .cell { aspect-ratio:1; border-radius:2px; background:var(--miss); transition:background .1s; }
  .cell.have { background:var(--have); }
  .cell.active { background:var(--active); box-shadow:0 0 6px var(--active); }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:14px; }
  button,select { background:#182030; color:var(--txt); border:1px solid var(--line);
    border-radius:6px; padding:7px 12px; font:inherit; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.go { background:#14532d33; border-color:#2ea04366; color:var(--have); }
  .stat { color:var(--dim); font-size:13px; } .stat b { color:var(--txt); }
  .peers { margin-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:2px 18px; font-size:12px; color:var(--dim); }
  .peers .pr.act { color:var(--cyan); }
  .bar { color:var(--accent); }
  .drop { border:1.5px dashed var(--line); border-radius:8px; padding:20px; text-align:center; color:var(--dim); cursor:pointer; }
  .drop:hover { border-color:var(--accent); color:var(--txt); }
  .kv { margin-top:12px; font-size:13px; } .kv div { padding:2px 0; }
  .kv b { color:var(--dim); display:inline-block; width:90px; } .kv span { color:#e6edf3; }
  a { color:var(--accent); } footer { margin-top:8px; color:var(--dim); font-size:12px; }
  code { color:var(--cyan); word-break:break-all; }
</style>
</head>
<body>
  <h1>swarm<span class="x">·</span>bittorrent</h1>
  <div class="sub">a from-scratch BitTorrent client — here's its piece-picking, simulated live</div>

  <div class="panel">
    <h2>swarm — rarest-first download (simulated)</h2>
    <div class="grid" id="grid"></div>
    <div class="row">
      <button id="go" class="go">▶ new swarm</button>
      <label class="stat">peers <select id="np"><option>8</option><option selected>14</option><option>24</option></select></label>
      <label class="stat">speed <input type="range" id="spd" min="0" max="60" value="38"></label>
      <span class="stat" id="stat">—</span>
    </div>
    <div class="peers" id="peers"></div>
  </div>

  <div class="panel">
    <h2>.torrent inspector</h2>
    <div class="drop" id="drop">drop a <code>.torrent</code> here, or click to pick one — parsed entirely in your browser</div>
    <input type="file" id="file" accept=".torrent" hidden />
    <div class="kv" id="kv"></div>
  </div>

  <footer>open source · <a href="https://github.com/AlexanderGese/swarm">github.com/AlexanderGese/swarm</a></footer>

<script type="module">
import init, { Sim, inspect } from './pkg/swarm_web.js';

const PIECES = 24 * 9; // 216, fills the 24-wide grid nicely
const gridEl = document.getElementById('grid');
const peersEl = document.getElementById('peers');
const statEl = document.getElementById('stat');
const cells = [];
for (let i = 0; i < PIECES; i++) {
  const d = document.createElement('div');
  d.className = 'cell';
  gridEl.appendChild(d);
  cells.push(d);
}

let sim = null, timer = null;

function draw(st) {
  for (let i = 0; i < PIECES; i++) {
    const c = cells[i];
    c.className = 'cell' + (st.have[i] === '1' ? ' have' : '') + (i === st.active ? ' active' : '');
  }
  statEl.innerHTML = `<b>${st.done}/${st.total}</b> pieces`;
  peersEl.innerHTML = st.peers.map(p => {
    const n = Math.round(p.f * 8);
    const bar = '█'.repeat(n) + '░'.repeat(8 - n);
    return `<div class="pr${p.a ? ' act' : ''}">${p.a ? '▶' : ' '} ${p.l.padEnd(15)} <span class="bar">${bar}</span></div>`;
  }).join('');
}

function start() {
  if (timer) clearInterval(timer);
  const peers = +document.getElementById('np').value;
  const seed = BigInt(Math.floor(Math.random() * 2 ** 52));
  sim = new Sim(PIECES, peers, seed);
  draw(JSON.parse(sim.render()));
  const tick = () => {
    const delay = Math.max(4, 62 - +document.getElementById('spd').value);
    const more = sim.step();
    draw(JSON.parse(sim.render()));
    if (!more) { clearInterval(timer); timer = null; statEl.innerHTML += ' · <span style="color:var(--have)">complete ✓</span>'; }
  };
  timer = setInterval(tick, Math.max(4, 62 - +document.getElementById('spd').value));
}

document.getElementById('go').onclick = start;

// inspector
const drop = document.getElementById('drop'), fileInput = document.getElementById('file'), kv = document.getElementById('kv');
drop.onclick = () => fileInput.click();
fileInput.onchange = e => e.target.files[0] && readTorrent(e.target.files[0]);
drop.ondragover = e => { e.preventDefault(); drop.style.borderColor = 'var(--accent)'; };
drop.ondragleave = () => drop.style.borderColor = '';
drop.ondrop = e => { e.preventDefault(); drop.style.borderColor = ''; e.dataTransfer.files[0] && readTorrent(e.dataTransfer.files[0]); };

async function readTorrent(file) {
  const buf = new Uint8Array(await file.arrayBuffer());
  const r = JSON.parse(inspect(buf));
  if (!r.ok) { kv.innerHTML = `<div style="color:#f85149">parse error: ${r.error}</div>`; return; }
  const mb = (r.size / 1048576).toFixed(2);
  kv.innerHTML = `
    <div><b>name</b><span>${r.name}</span></div>
    <div><b>info hash</b><code>${r.hash}</code></div>
    <div><b>size</b><span>${r.size.toLocaleString()} bytes (${mb} MiB)</span></div>
    <div><b>pieces</b><span>${r.pieces} × ${r.piece_len.toLocaleString()} bytes</span></div>
    <div><b>trackers</b><span>${r.trackers.join('<br>') || '—'}</span></div>`;
}

init().then(start);
</script>
</body>
</html>
